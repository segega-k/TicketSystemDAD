upstream backend {
    least_conn;
    server backend-1:8080 max_fails=3 fail_timeout=10s;
    server backend-2:8080 max_fails=3 fail_timeout=10s;
}

upstream backend_ws {
    ip_hash;
    server backend-1:8080;
    server backend-2:8080;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; connect-src 'self' wss: ws:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

    client_max_body_size 1m;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location ~ ^/(api|swagger-ui|v3|actuator)/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
    }

    location /ws {
        proxy_pass http://backend_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade        $http_upgrade;
        proxy_set_header   Connection     "upgrade";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host         $host;
        proxy_set_header X-Real-IP    $remote_addr;
    }
}

# TLS-серверный блок включается отдельно через certs/server.crt.
# Self-signed cert создаётся через `make certs` (см. Makefile).
server {
    listen 443 ssl;
    http2 on;
    server_name tickets.local tickets.inha.uz;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; connect-src 'self' wss:; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

    client_max_body_size 1m;

    location = /health {
        access_log off;
        return 200 "ok\n";
    }

    location ~ ^/(api|swagger-ui|v3|actuator)/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id      $request_id;
    }

    location /ws {
        proxy_pass http://backend_ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade        $http_upgrade;
        proxy_set_header   Connection     "upgrade";
        proxy_set_header   Host           $host;
        proxy_set_header   X-Real-IP      $remote_addr;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host         $host;
    }
}
