spring:
  application.name: ticket-system-dad
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_system_dad}
    username: ${SPRING_DATASOURCE_USERNAME:ticket_system_dad}
    password: ${SPRING_DATASOURCE_PASSWORD:ticket_system_dad}
  jpa:
    hibernate.ddl-auto: validate
    properties.hibernate.jdbc.time_zone: UTC
  flyway.enabled: true
  batch:
    jdbc.initialize-schema: always
    job.enabled: false
  data.redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
server:
  port: ${PORT:8080}
management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
  endpoint.health.probes.enabled: true
springdoc:
  swagger-ui.path: /swagger-ui.html
app:
  redis.fail-closed: ${APP_REDIS_FAIL_CLOSED:true}
  jwt:
    issuer: ticket-system-dad
    access-ttl-seconds: 1800
    refresh-ttl-seconds: 604800
    rsa-public-key: ${JWT_RSA_PUBLIC_KEY:}
    rsa-private-key: ${JWT_RSA_PRIVATE_KEY:}
    rsa-public-key-path: ${JWT_RSA_PUBLIC_KEY_PATH:}
    rsa-private-key-path: ${JWT_RSA_PRIVATE_KEY_PATH:}
  holds.ttl-seconds: 600
  holds.max-per-user-event: 6
  rate-limit.holds-per-minute: 10
  idempotency.ttl-seconds: 86400
  outbox:
    poll-interval-ms: 200
    batch-size: 100
    max-attempts-before-poison: 10
    backlog-alert-threshold: 1000
  cancellation.min-hours-before-event: 24
  payment.mock: true
