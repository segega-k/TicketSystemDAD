upstream backend {
  least_conn;
  server backend-1:8080 max_fails=3 fail_timeout=10s;
  server backend-2:8080 max_fails=3 fail_timeout=10s;
}

upstream backend_ws {
  ip_hash;
  server backend-1:8080;
  server backend-2:8080;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /api/v1/ { proxy_pass http://backend/api/v1/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
  location /ws { proxy_pass http://backend_ws/ws; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $host; }
  location / { try_files $uri $uri/ /index.html; }
}
