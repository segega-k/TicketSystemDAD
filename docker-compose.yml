services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticket_system_dad}
      POSTGRES_USER: ${POSTGRES_USER:-ticket_system_dad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ticket_system_dad}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER:-ticket_system_dad}" -d "$${POSTGRES_DB:-ticket_system_dad}"']
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    command: ["redis-server", "--notify-keyspace-events", "Ex", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: ${BACKEND_CONTAINER_PORT:-8080}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/ticket_system_dad}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-ticket_system_dad}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-ticket_system_dad}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_CONTAINER_PORT:-6379}
      APP_REDIS_FAIL_CLOSED: ${APP_REDIS_FAIL_CLOSED:-true}
      JWT_RSA_PRIVATE_KEY_PATH: ${JWT_RSA_PRIVATE_KEY_PATH:-/run/secrets/jwt_private.pem}
      JWT_RSA_PUBLIC_KEY_PATH: ${JWT_RSA_PUBLIC_KEY_PATH:-/run/secrets/jwt_public.pem}
    volumes:
      - ./infra/jwt:/run/secrets:ro
    ports:
      - "${BACKEND_PORT:-8080}:${BACKEND_CONTAINER_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:$${PORT:-8080}/actuator/health/readiness || curl -fsS http://127.0.0.1:$${PORT:-8080}/actuator/health",
        ]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.1}
    profiles: ["observability"]
    depends_on:
      backend:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./docs/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
